<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRIDGE - Profile</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <h1 class="logo">BRIDGE</h1>
    <span class="tagline">User Profile</span>
  </div>

  <div class="nav-right">
    <a href="/"><button type="button" class="nav-btn">Jobs</button></a>
    <a href="/compare"><button type="button" class="nav-btn">Compare</button></a>
    <a href="/tracker"><button type="button" class="nav-btn">Tracker</button></a>
    <a href="/profile"><button type="button" class="nav-btn active-nav">Profile</button></a>
  </div>
</nav>

<section class="page-container">

  <div class="profile-hero">
    <div class="profile-left">
      <div class="profile-avatar" id="profileAvatar">U</div>

      <div>
        <h2 id="profileHeaderName">My Profile</h2>
        <p class="profile-subtext">
          Save your skills and background so BRIDGE can match jobs to your profile.
        </p>
        <p id="profileSaveStatus" class="profile-subtext" style="min-height:1.25em;color:#2e7d32;"></p>
      </div>
    </div>

    <div class="profile-right">
      <div class="profile-stat">
        <h3 id="profileSavedJobs">0</h3>
        <p>Saved Jobs</p>
      </div>

      <div class="profile-stat">
        <h3 id="profileCompareJobs">0</h3>
        <p>Compare List</p>
      </div>

      <div class="profile-stat">
        <h3 id="profileTrackerJobs">0</h3>
        <p>Tracked Jobs</p>
      </div>
    </div>
  </div>

  <div class="profile-card">

    <h3 class="section-title">Personal Information</h3>

    <div class="profile-grid">
      <div class="filter-group">
        <label>Full Name</label>
        <input id="profileName" placeholder="John Doe">
      </div>

      <div class="filter-group">
        <label>Email</label>
        <input id="profileEmail" placeholder="example@email.com">
      </div>
    </div>

    <h3 class="section-title" style="margin-top:25px;">Skills</h3>

    <div class="profile-grid">
      <div class="filter-group">
        <label>Add skills</label>
        <input type="hidden" id="profileSkillsHidden" value="">
        <input id="profileSkillInput" placeholder="Add a skill, press Enter or comma">
        <div id="profileSkillBubbles" class="input-bubbles"></div>
      </div>

      <div class="filter-group">
        <label>Preferred Location</label>
        <input id="profileLocation" placeholder="Austin, TX or Remote">
      </div>
    </div>

    <div class="filter-group" style="margin-top:15px;">
      <label>Preferred Job Types</label>
      <div class="type-bubbles">
        <button type="button" class="bubble" data-type="Full-Time">Full-Time</button>
        <button type="button" class="bubble" data-type="Part-Time">Part-Time</button>
        <button type="button" class="bubble" data-type="Internship">Internship</button>
      </div>
    </div>

    <h3 class="section-title" style="margin-top:25px;">Experience</h3>
    <p class="profile-subtext">Projects, internships, jobs, or volunteer roles.</p>
    <div id="experienceList" class="profile-entry-list"></div>
    <button type="button" class="secondary" id="addExperienceBtn" style="margin-top:8px;">Add experience</button>

    <h3 class="section-title" style="margin-top:25px;">Education</h3>
    <p class="profile-subtext">School, program, or course.</p>
    <div id="educationList" class="profile-entry-list"></div>
    <button type="button" class="secondary" id="addEducationBtn" style="margin-top:8px;">Add education</button>

    <div class="profile-actions" style="margin-top:24px;">
      <button type="button" class="save-btn" id="saveProfileBtn">Save Profile</button>
      <button type="button" class="danger-btn" id="clearProfileBtn">Clear Profile</button>
    </div>

  </div>

</section>

<script src="/static/profile.js"></script>
</body>
</html>
