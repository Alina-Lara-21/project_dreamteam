<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge Job Filter</title>
<link rel="stylesheet" href="/static/homepage.css">
</head>

<body>

<header class="navbar">

<h2 class="site-title">Bridge</h2>

<a href="/" class="nav-btn">Look for Jobs</a>

</header>


<section class="hero">

<img src="/static/images/logo.png" alt="Bridge Job Search" class="logo">

<h1 class="headline">Find the right job faster</h1>

<p class="tagline">
Bridge connects your skills to the jobs that fit you best.
</p>

<a href="/" class="cta-btn">Start Searching</a>

</section>

<section style="max-width:720px;margin:40px auto;padding:0 16px;font-family:system-ui,sans-serif;">
  <h2>Featured roles</h2>
  <div id="homeJobList"></div>
  <button type="button" id="loadMoreHomeJobs" class="nav-btn" style="margin-top:12px;">Load more</button>
</section>

<script>
  const API_BASE = window.location.origin;
  let homeJobs = [];
  let homeVisible = 5;
  async function loadHomeJobs() {
    const r = await fetch(API_BASE + "/jobs?limit=5000");
    const d = await r.json();
    homeJobs = d.jobs || [];
    renderHomeJobs();
  }
  function renderHomeJobs() {
    const el = document.getElementById("homeJobList");
    if (!el) return;
    el.innerHTML = "";
    homeJobs.slice(0, homeVisible).forEach((j) => {
      const div = document.createElement("div");
      div.style.cssText = "border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:10px;";
      const desc = (j.description || "").slice(0, 120);
      div.innerHTML = "<strong>" + j.title + "</strong><br><span style=\"color:#555;\">" + j.company + "</span><p style=\"margin:8px 0 0;font-size:0.9rem;color:#444;\">" + desc + (j.description && j.description.length > 120 ? "…" : "") + "</p>";
      el.appendChild(div);
    });
    const btn = document.getElementById("loadMoreHomeJobs");
    if (btn) btn.style.display = homeVisible >= homeJobs.length ? "none" : "inline-block";
  }
  const loadMoreHome = document.getElementById("loadMoreHomeJobs");
  if (loadMoreHome) {
    loadMoreHome.addEventListener("click", () => {
      homeVisible += 5;
      renderHomeJobs();
    });
  }
  loadHomeJobs();
</script>

</body>
</html>
